services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: world_cup_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  model:
    build:
      context: .
      dockerfile: Dockerfile.model
    environment:
      MODEL_SERVICE_TOKEN: local-development-token
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/world_cup_intelligence
      REDIS_URL: redis://redis:6379
      MODEL_SERVICE_URL: http://model:8000
      MODEL_SERVICE_TOKEN: local-development-token
      POLYMARKET_API_BASE_URL: https://gamma-api.polymarket.com
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      model:
        condition: service_started

volumes:
  postgres_data:
